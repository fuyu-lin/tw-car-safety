<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建立新車安全資訊透明化制度，整頓目前車市歪風，別讓消費者用生命買單</title>
    <style>
        /* 基本樣式定義 */
        :root {
            --primary-color: #e74c3c; /* 警告/急迫的紅色 */
            --secondary-color: #34495e; /* 沉穩的深灰色 */
            --bg-color: #f9f9f9;
            --text-color: #333;
            --container-width: 1200px; /* 加寬容器以適應寬圖 */
        }

        body {
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            line-height: 1.8;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
        }

        /* 核心視覺區 */
        .banner-container {
            width: 100%;
            background-color: #fff;
            padding: 40px 0;
            border-bottom: 2px solid #ddd;
        }

        .core-illustration {
            display: block;
            max-width: 100%;
            width: 100%;
            height: auto;
            max-height: 700px;
            margin: 0 auto;
            object-fit: contain; /* 確保整張圖片清晰呈現，不被裁切 */
        }

        /* 主要內容區 */
        .main-container {
            max-width: var(--container-width);
            margin: 0 auto 50px;
            padding: 40px 20px;
        }

        /* 標題與簡介 */
        h1.main-title {
            color: var(--primary-color);
            font-size: 2.8em;
            margin-top: 0;
            text-align: center;
        }

        .highlight-box {
            background-color: #fff3f3;
            border-left: 5px solid var(--primary-color);
            padding: 15px 20px;
            margin: 20px 0 40px;
            border-radius: 4px;
            text-align: center;
        }

        /* 議題核心與訴求區塊對應 */
        .petition-core {
            display: grid;
            grid-template-columns: 2fr 1fr; /* 分為兩欄，左側為主訴求 */
            gap: 40px;
            margin-bottom: 60px;
        }

        .petition-details p {
            margin-bottom: 1.5em;
            font-size: 1.1em;
        }

        .petition-details-title {
            color: var(--secondary-color);
            font-size: 1.8em;
            margin-bottom: 20px;
        }

        /* 訴求清單樣式 */
        .demand-list {
            list-style-type: decimal;
            padding-left: 20px;
        }

        .demand-list li {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #444;
        }

        /* 附議行動區塊 */
        .petition-action-block {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* 超大連署按鈕 */
        .cta-button {
            display: block;
            width: 100%;
            margin: 20px auto;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(231, 76, 60, 0.4);
            background-color: #d63031;
        }

        /* 轉發分享區塊 */
        .share-section {
            background-color: #eaf2f8;
            padding: 25px;
            border-radius: 8px;
            margin-top: 30px;
            border: 1px solid #b2ebf2;
            grid-column: 1 / -1; /* 跨越兩欄 */
        }

        .share-section h2 {
            margin-top: 0;
            color: #1976d2;
        }

        /* 誰該參與附議區塊 */
        .who-section {
            max-width: 700px;
            margin: 50px auto;
            text-align: center;
        }

        .who-section img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
        }

        .who-section .mini-cta {
            display: inline-block;
            margin-top: 25px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            padding: 14px 36px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .who-section .mini-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(231, 76, 60, 0.4);
            background-color: #d63031;
        }

        @media (max-width: 768px) {
            .who-section {
                margin: 35px auto;
            }
        }

        /* 頁尾 */
        footer {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 0.9em;
            border-top: 1px solid #eee;
        }

        /* RWD 響應式排版 */
        @media (max-width: 992px) {
            :root {
                --container-width: 100%;
            }
            .petition-core {
                grid-template-columns: 1fr; /* 改為單欄 */
            }
            .petition-action-block {
                margin-top: 20px;
            }
        }

        @media (max-width: 768px) {
            h1.main-title {
                font-size: 2.2em;
            }
            .core-illustration {
                max-height: 400px;
            }
        }
    </style>
</head>
<body>

    <!-- 核心視覺區：直接呈現插圖 -->
    <div class="banner-container">
        <!-- 插圖檔名必須為 banner.jpg -->
        <img src="banner.jpg" alt="車輛權益受害者連署議題核心插圖" class="core-illustration">
    </div>

    <!-- 主要內容區 -->
    <div class="main-container">
        <h1 class="main-title">60天內我們需要 5000 人，一起向主管機關要回覆！<br>
  
        </h1>


        

        <!-- 議題核心與訴求區塊對應 -->
        <div class="petition-core">
            <div class="petition-details">
                
                <div class="who-section">
            <img src="join-reasons.png" alt="哪些人特別值得參與這次附議">
        </div>
            </div>

            <!-- 附議行動區塊 -->
            <div class="petition-action-block">
                <h3>👇 點擊下方按鈕進入公共政策平台進行附議 👇</h3>
                <a href="https://join.gov.tw/idea/detail/3dd3430e-1815-452a-993e-80f987fe022d" target="_blank" class="cta-button">
                    附議公共政策連署
                </a>
                <p style="font-size: 0.9em; color: #777; margin-top: 10px;">(頁面將直接開啟國發會連署平台)</p>
            </div>

            
        </div>
		        <!-- 轉發分享區塊：跨兩欄 -->
            <div class="share-section">
                <h2>🚨 請求轉發！讓我們出一份力</h2>
                <p>我們迫切需要熱心人士幫忙附議/轉發（PTT、FB、Dcard、Threads、LINE 群組....）。請讓這張插圖所呈現的訊息被更多人看見，不管是當前車主未來車主或是乘客都能受益，感謝你的幫忙！</p>
            </div>

        <!-- 誰該參與附議區塊 -->

    </div>

    <footer>
        此為個人發起之臨時連署推廣網頁 | 資料來源為公共政策網路參與平台 | 本網頁核心資訊已妥善整合至上方插圖中。
    </footer>

</body>
</html>
